price_path: "data/raw/HistoricPrices.csv"
price_date_col: 4
price_value_col: 5

macro_path: "data/raw/MacroData.csv"
news_path: "data/raw/News_Category_Dataset_v3.json"

price_features:
  - log_return
  - rolling_vol_21
  - log_return_lag1
  - log_return_lag2
  - log_return_lag3
  - rolling_vol_21_mean_252
  - vol_regime_high

output_dir: "outputs"
model_version: "baseline_v1"

model:
  model_type: lstm      # ridge | xgboost | lightgbm | arima | lstm
  n_splits: 5
  ridge_alpha: 0.10

  # XGBoost params (only used if model_type == xgboost)
  xgb_n_estimators: 300
  xgb_max_depth: 4
  xgb_learning_rate: 0.05

  # LightGBM params (only used if model_type == lightgbm)
  lgb_n_estimators: 300
  lgb_max_depth: -1
  lgb_learning_rate: 0.05

  model_type: arima
  n_splits: 5
  arima_order: [1, 0, 0]

  model_type: lstm
  n_splits: 5
  lookback: 20

horizons: [1, 3, 5, 10, 20]

asset_keywords:
  Gold: ["gold", "inflation", "fed", "dollar", "treasury", "rate hike"]
  Silver: ["silver", "inflation", "industrial demand", "fed"]
  Platinum: ["platinum", "automotive", "catalyst", "supply", "mine"]
  Copper: ["copper", "china", "industrial", "construction", "infrastructure"]
  Crude: ["oil", "opec", "inventory", "production", "geopolitics"]
  Corn: ["corn", "crop", "harvest", "weather", "usda"]
  Coffee: ["coffee", "brazil", "frost", "weather", "supply"]
  HeatingOil: ["heating oil", "refinery", "distillate", "winter"]